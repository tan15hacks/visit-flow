name: Supabase CI

on:
  pull_request:
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-ci.yml'
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-ci.yml'

permissions:
  contents: read

jobs:
  verify:
    name: Reset, lint, and test database
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.84.2

      - name: Start local Supabase stack
        run: supabase start

      - name: Rebuild database from migrations
        run: supabase db reset

      - name: Lint database schema
        run: supabase db lint --level warning

      - name: Run pgTAP database tests
        run: supabase test db

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup
