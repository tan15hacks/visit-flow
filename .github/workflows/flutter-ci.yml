name: Flutter CI

on:
  pull_request:
    paths:
      - 'apps/staff_mobile/**'
      - 'scripts/bootstrap_staff_mobile.*'
      - '.github/workflows/flutter-ci.yml'
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'apps/staff_mobile/**'
      - 'scripts/bootstrap_staff_mobile.*'
      - '.github/workflows/flutter-ci.yml'

permissions:
  contents: read

jobs:
  verify:
    name: Format, analyze, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Show Flutter environment
        run: flutter doctor -v

      - name: Generate native platform scaffolding
        run: bash scripts/bootstrap_staff_mobile.sh

      - name: Install dependencies
        working-directory: apps/staff_mobile
        run: flutter pub get

      - name: Verify formatting
        working-directory: apps/staff_mobile
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Run static analysis
        working-directory: apps/staff_mobile
        run: flutter analyze

      - name: Run tests
        working-directory: apps/staff_mobile
        run: flutter test

      - name: Build Android debug APK
        working-directory: apps/staff_mobile
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: visitflow-staff-debug-apk
          path: apps/staff_mobile/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7
