name: Visitor Web CI

on:
  pull_request:
    paths:
      - 'apps/visitor_web/**'
      - '.github/workflows/visitor-web-ci.yml'
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'apps/visitor_web/**'
      - '.github/workflows/visitor-web-ci.yml'

permissions:
  contents: write

jobs:
  verify:
    name: Install, lint, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: apps/visitor_web

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies and create lockfile
        run: npm install --no-audit --no-fund

      - name: Commit generated lockfile on branch pushes
        if: github.event_name == 'push'
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- package-lock.json)" ]; then
            echo "Dependency lockfile is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore(web): lock visitor portal dependencies"
          git push

      - name: Upload generated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: visitflow-visitor-web-package-lock
          path: apps/visitor_web/package-lock.json
          if-no-files-found: error
          retention-days: 7

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Build production portal
        run: npm run build
