name: Visitor Web CI

on:
  pull_request:
    paths:
      - 'apps/visitor_web/**'
      - '.github/workflows/visitor-web-ci.yml'
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'apps/visitor_web/**'
      - '.github/workflows/visitor-web-ci.yml'

permissions:
  contents: read

jobs:
  verify:
    name: Install, lint, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: apps/visitor_web

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/visitor_web/package-lock.json

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Build production portal
        run: npm run build
